name: Release

on:
  push:
    branches: [ release ]

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from Cargo.toml
      id: get_version
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        release_name: Release v${{ steps.get_version.outputs.version }}
        body: |
          Automated release v${{ steps.get_version.outputs.version }}
          
          ## Downloads
          - Windows: mdnotes-windows-x86_64.zip (mdn.exe, mdnui.exe)
          - Linux: mdnotes-linux-x86_64.tar.gz (mdn, mdnui)
          - macOS (Intel): mdnotes-macos-x86_64.tar.gz (mdn, mdnui)
          - macOS (Apple Silicon): mdnotes-macos-aarch64.tar.gz (mdn, mdnui)
        draft: false
        prerelease: false

  build-and-upload:
    name: Build and Upload - ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x86_64
            archive_name: mdnotes-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x86_64
            archive_name: mdnotes-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS x86_64
            archive_name: mdnotes-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS ARM64
            archive_name: mdnotes-macos-aarch64.tar.gz

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}

    - name: Build release binaries
      run: cargo build --release --target ${{ matrix.target }} --bin mdn --bin mdnui

    - name: Create archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd target/${{ matrix.target }}/release
        ls mdn mdnui
        tar -czf ../../../${{ matrix.archive_name }} mdn mdnui

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      run: |
        $ErrorActionPreference = "Stop"
        $dist = "target/${{ matrix.target }}/release"
        Get-Item "$dist/mdn.exe","$dist/mdnui.exe"
        Compress-Archive -Path "$dist/mdn.exe","$dist/mdnui.exe" -DestinationPath "${{ matrix.archive_name }}"

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.archive_name }}
        asset_name: ${{ matrix.archive_name }}
        asset_content_type: application/octet-stream
